app = 'open-proxy-mcp'
primary_region = 'nrt'

[build]

[env]
  FASTMCP_PORT = '8000'
  FASTMCP_HOST = '0.0.0.0'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
